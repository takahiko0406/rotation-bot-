name: Rotation Bot

on:
  schedule:
    - cron: "30 22 * * *"
    - cron: "30 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install packages
        run: pip install numpy pandas yfinance scikit-learn requests

      - name: Run model
        run: python model_c_plus_usd_hyg_short_conviction_tqqq_tiered_overlay.py

      - name: Run alert checker
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python github_alert_runner.py

      - name: Save alert state
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add last_alert_state.json || true
          git commit -m "Update alert state" || echo "No state change"
          git push || true
