name: Run Model

on:
  schedule:
    - cron: "0 23 * * 1-5"   # 08:00 Japan time
    - cron: "0 11 * * 1-5"   # 20:00 Japan time
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install packages
        run: |
          pip install pandas numpy yfinance requests

      - name: Run model + alert
        run: python run_model_and_alert.py
